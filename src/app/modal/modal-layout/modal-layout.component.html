<div class="absolute inset-0 -z-10 bg-layer-bg bg-cover bg-center"></div>

<div class="flex h-dvh flex-col pt-[env(safe-area-inset-top)]">
  @if (title()) {
    <header
      class="bottom-shadow z-50 flex flex-row justify-between h-16 items-center gap-3 bg-layer-panel-light px-3"
    >
      <h1
        class="font-title text-xl font-extrabold tracking-wide text-text-primary"
      >
        {{ title() }}
      </h1>

      <button
        type="button"
        class="hud-slot flex h-9 w-9 items-center justify-center rounded-xl font-title text-2xl font-black text-text-primary"
        (click)="close()"
      >
        ×
      </button>
    </header>
  }

  <main class="min-h-0 flex-1 overflow-hidden p-3">
    <div
      class="flex h-full min-h-0 flex-col rounded-2xl border-2 border-primary-800 bg-layer-inset/75 p-3 shadow-[inset_0_2px_4px_rgb(255_255_255/0.08),inset_0_-4px_6px_rgb(0_0_0/0.28)]"
    >
      <ng-content></ng-content>
    </div>
  </main>

  <footer
    class="top-shadow z-50 flex h-9 items-center justify-center bg-layer-panel-light px-3"
  >
    <button
      type="button"
      class="hud-slot flex h-7 w-7 items-center justify-center rounded-lg active:translate-y-[1px]"
      (click)="goToMenu()"
    >
      <img
        src="assets/icon/main-menu.png"
        alt="menu"
        class="h-5 w-5 object-contain"
      />
    </button>
  </footer>
</div>
