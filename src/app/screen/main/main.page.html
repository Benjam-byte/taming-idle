<ion-content [fullscreen]="true">
  <app-top-hud-bar />

  <div class="game-viewport">
    <div id="pixiGameContainer" #pixiGameContainer class="pixi-container"></div>

    @if(isCombatRunning()) {
    <app-combat [mapSceneRenderer]="mapSceneRenderer" />
    } @else {
    <app-exploration />
    }
  </div>

  <app-bottom-hud-bar />
</ion-content>
