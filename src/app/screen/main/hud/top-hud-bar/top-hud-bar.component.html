<div
  class="hud-bar hud-bar--top bottom-shadow absolute left-0 right-0 top-0 gap-3"
>
  <div
    class="hud-slot flex h-12 w-12 shrink-0 items-center justify-center rounded-xl"
  >
    <img
      src="assets/monster/slime/Slime_Base.webp"
      alt="slime portrait"
      class="h-9 w-9 scale-150 object-contain"
    />
  </div>

  <div
    class="relative flex h-12 flex-1 gap-2 items-center justify-center rounded-xl bg-primary-500"
  >
    <div
      class="pointer-events-none absolute inset-0 opacity-15 wood-grain"
    ></div>

    <app-hud-resource-chip
      iconSrc="assets/object/Wheat.webp"
      alt="Wheat"
      [value]="wheat()"
    />
    <app-hud-resource-chip
      iconSrc="assets/object/Soul.webp"
      alt="Soul"
      [value]="soul()"
    />
    <app-hud-resource-chip
      iconSrc="assets/object/Glitched_Stone.webp"
      alt="Glitched stone"
      [value]="glitchedStone()"
      [largeIcon]="true"
    />
  </div>
</div>
