<section class="w-full">
  <div
    class="relative rounded-[14px] bg-primary-500 border-2 border-[var(--color-primary-800)] bg-[linear-gradient(180deg,rgba(255,255,255,0.08),rgba(0,0,0,0.18)),var(--color-primary-600)] py-2 pr-2 pl-4 shadow-[inset_0_1px_2px_rgba(255,255,255,0.16),inset_0_-3px_4px_rgba(0,0,0,0.38),0_3px_0_var(--color-layer-border),0_5px_7px_rgba(0,0,0,0.55)]"
  >
    <span
      class="absolute top-2 bottom-2 left-2 w-1 rounded-full bg-[#6fa348] shadow-[inset_0_1px_1px_rgba(255,255,255,0.25),0_1px_0_rgba(20,12,7,0.8)]"
    ></span>

    <div class="ml-2 flex items-center gap-2">
      <div class="min-w-0 flex-1">
        <div class="mb-1 flex items-center justify-between gap-2">
          <span
            class="truncate font-[var(--font-title)] text-[13px] leading-none font-black tracking-[0.04em] text-[var(--color-text-primary)] uppercase [text-shadow:0_2px_0_rgba(20,12,7,0.9)]"
          >
            {{ playerName }}
          </span>

          <span
            class="shrink-0 rounded-full border border-white/10 bg-[rgba(20,12,7,0.45)] px-[6px] py-[3px] font-[var(--font-title)] text-[9px] leading-none font-black tracking-[0.06em] text-[#d8ffd0] uppercase"
          >
            DMG {{ damage }}
          </span>
        </div>

        <div class="flex items-center gap-2">
          <div
            class="h-[10px] flex-1 overflow-hidden rounded-full border border-white/10 bg-[rgba(20,12,7,0.7)] p-[2px] shadow-[inset_0_2px_3px_rgba(0,0,0,0.55),0_1px_0_rgba(255,255,255,0.08)]"
          >
            <div
              class="ml-auto h-full rounded-full bg-[linear-gradient(180deg,rgba(255,255,255,0.28),transparent_45%),linear-gradient(90deg,#6fa348,#d6b44a,#c94b3d)] shadow-[inset_0_-1px_2px_rgba(0,0,0,0.3),0_0_5px_rgba(111,163,72,0.35)] transition-[width] duration-200 ease-out"
              [style.width.%]="hpPercent"
            ></div>
          </div>

          <span
            class="min-w-[52px] shrink-0 text-right font-[var(--font-title)] text-[10px] leading-none font-black text-white/80 [text-shadow:0_1px_0_rgba(20,12,7,0.9)]"
          >
            {{ currentHp }} / {{ maxHp }}
          </span>
        </div>
      </div>

      <button
        type="button"
        (click)="flee.emit()"
        class="flex h-8 w-8 shrink-0 items-center justify-center rounded-lg border-2 border-[var(--color-primary-800)] bg-[var(--color-primary-600)] shadow-[inset_0_1px_2px_rgba(255,255,255,0.2),inset_0_-2px_3px_rgba(0,0,0,0.4),0_2px_0_var(--color-layer-border),0_3px_5px_rgba(0,0,0,0.6)] transition active:translate-y-[2px] active:scale-95"
        aria-label="Fuir le combat"
      >
        <img src="assets/icon/back.png" class="h-4 w-4" alt="" />
      </button>
    </div>
  </div>
</section>
