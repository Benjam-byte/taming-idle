<app-combatant-panel
  [name]="playerName"
  statLabel="DMG"
  [statValue]="damage"
  [currentHp]="currentHp()"
  [maxHp]="maxHp()"
  accentColor="var(--color-hp-player)"
  badgeColor="var(--color-badge-player)"
>
  <app-ui-icon-button
    panelAction
    size="sm"
    label="Fuir le combat"
    (pressed)="flee.emit()"
  >
    <img src="assets/icon/back.png" class="h-4 w-4" alt="" />
  </app-ui-icon-button>
</app-combatant-panel>
